syntax = "proto3";

package centrifugal.centrifugo.api;

option go_package = "./;apiproto";
option php_namespace = "Inexdigital\\Centrifugo\\Grpc\\Centrifugal\\Api";
option php_metadata_namespace = "Inexdigital\\Centrifugo\\Grpc\\Centrifugal\\GPBMetadata";

service CentrifugoApi {
    rpc Publish (PublishRequest) returns (PublishResponse) {}
}

message PublishRequest {
    string channel = 1;
    bytes data = 2;
}

message PublishResponse {
    Error error = 1;
    PublishResult result = 2;
}

message PublishResult {
    uint64 offset = 1;
    string epoch = 2;
}

message Error {
    uint32 code = 1;
    string message = 2;
}